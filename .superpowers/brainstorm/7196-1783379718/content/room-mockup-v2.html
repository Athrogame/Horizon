<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Morning Sun Mockup v2</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0d0d0d;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    min-height:100vh;
    font-family:sans-serif;
  }
  h2 { color:#aaa; margin-bottom:8px; font-size:14px; letter-spacing:1px; }
  p.note { color:#555; font-size:11px; margin-bottom:16px; }

  /* ─── SCENE CONTAINER ─── */
  .scene {
    position:relative;
    width:700px;
    height:210px; /* ~4.7:1 scaled down */
    overflow:hidden;
    border:2px solid #333;
    border-radius:3px;
    image-rendering:pixelated;
  }

  /* ─── ROOM STRUCTURE ─── */
  .wall {
    position:absolute; inset:0;
    background:#3d1f62; /* deep purple wall */
  }
  .floor {
    position:absolute;
    bottom:0; left:0; right:0;
    height:36%;
    background:#5c3d14;
    border-top:2px solid #7a5520;
  }
  /* subtle floor shadow at base of wall */
  .floor-shadow {
    position:absolute;
    bottom:36%; left:0; right:0;
    height:6px;
    background:linear-gradient(to bottom, rgba(0,0,0,0.35), transparent);
  }

  /* ─── FURNITURE ─── */
  /* desk left */
  .desk {
    position:absolute;
    bottom:36%; left:1%;
    width:72px; height:42px;
    background:#4a2e0e;
    border-top:2px solid #7a5520;
  }
  .monitor {
    position:absolute;
    top:-26px; left:10px;
    width:24px; height:20px;
    background:#111; border:2px solid #333;
  }
  .monitor-screen { width:100%; height:75%; background:#1a3a5a; }
  .monitor-stand {
    position:absolute; bottom:-5px; left:7px;
    width:10px; height:5px; background:#333;
  }

  /* picture on wall */
  .picture {
    position:absolute;
    top:8%; left:3%;
    width:32px; height:30px;
    background:#ddd; border:2px solid #6a4a20;
    display:flex; align-items:center; justify-content:center;
    font-size:14px;
  }

  /* bookshelves */
  .shelf {
    position:absolute;
    bottom:36%;
    width:50px; height:76px;
    background:#3a2008;
    border:2px solid #5a3810;
  }
  .shelf-bar {
    position:absolute; left:0; right:0;
    height:2px; background:#5a3810;
  }
  .book { display:inline-block; width:6px; border-radius:1px 0 0 0; }

  /* rug */
  .rug {
    position:absolute;
    bottom:8%; left:22%; right:30%;
    height:40px;
    border-radius:50%;
    background:#0e073a;
    border:2px solid #c49010;
  }

  /* couch/bench */
  .couch {
    position:absolute;
    bottom:36%; left:53%;
    width:70px; height:30px;
    background:#5a1818;
    border-top:3px solid #7a2828;
    border-radius:3px 3px 0 0;
  }
  .couch-cushion {
    position:absolute; top:2px; left:3px; right:3px; bottom:0;
    background:#6a2020; border-radius:2px 2px 0 0;
  }

  /* door */
  .door {
    position:absolute;
    bottom:36%; right:2%;
    width:38px; height:72px;
    background:#2a1208;
    border:2px solid #4a2810;
    border-radius:2px 2px 0 0;
  }
  .door-knob {
    position:absolute; right:5px; top:42%;
    width:5px; height:5px;
    border-radius:50%; background:#b89018;
  }

  /* cat on shelf */
  .cat {
    position:absolute;
    font-size:13px;
    bottom:68%; left:46%;
  }

  /* character */
  .char {
    position:absolute;
    font-size:14px;
    bottom:36%; right:16%;
  }

  /* ─── LIGHT SHAFT ─── */
  /*
    Window is a small rectangle on the upper-left wall.
    Sun is outside upper-left → beam goes diagonally DOWN and to the LEFT
    (steep angle, so it hits the floor close to the left wall)
  */

  /* window frame on wall */
  .window-frame {
    position:absolute;
    top:14%; left:9%;
    width:22px; height:26px;
    border:3px solid #4a3018;
    background:rgba(255,230,140,0.55);
    box-shadow:0 0 8px 3px rgba(255,210,80,0.6),
               0 0 18px 8px rgba(255,180,40,0.3);
    z-index:10;
  }
  .window-crossbar-h {
    position:absolute; top:47%; left:0; right:0;
    height:2px; background:rgba(60,30,10,0.7);
  }
  .window-crossbar-v {
    position:absolute; left:47%; top:0; bottom:0;
    width:2px; background:rgba(60,30,10,0.7);
  }

  /* wide outer beam — large soft cone */
  .beam-outer {
    position:absolute;
    /* origin: near the window (upper-left area) */
    top:0; left:0;
    width:220px; height:100%;

    /* clip-path: trapezoid from window down-left to floor */
    clip-path: polygon(
      8%  14%,   /* window top-left  */
      14% 14%,   /* window top-right */
      22% 64%,   /* floor right      */
      2%  64%    /* floor left       */
    );

    background: radial-gradient(
      ellipse at 11% 20%,
      rgba(255,210,70,0.45) 0%,
      rgba(255,190,50,0.30) 25%,
      rgba(255,170,30,0.12) 60%,
      transparent 100%
    );
    filter:blur(5px);
    animation: breathe 4.5s ease-in-out infinite;
    z-index:5;
  }

  /* inner bright beam */
  .beam-inner {
    position:absolute;
    top:0; left:0;
    width:220px; height:100%;

    clip-path: polygon(
      9%  14%,
      13% 14%,
      20% 64%,
      5%  64%
    );

    background: linear-gradient(
      160deg,
      rgba(255,240,140,0.55) 0%,
      rgba(255,220,100,0.35) 40%,
      rgba(255,200,60,0.15)  80%,
      transparent 100%
    );
    filter:blur(2px);
    animation: breathe 4.5s ease-in-out infinite;
    z-index:6;
  }

  /* floor streak — rectangle of warm light on the floor */
  .floor-streak {
    position:absolute;
    bottom:0; left:0;
    width:200px; height:36%; /* covers the floor zone */

    clip-path: polygon(
      1%  0%,    /* top-left of floor streak (at floor line) */
      24% 0%,   /* top-right */
      28% 100%,  /* bottom-right  */
      0%  100%   /* bottom-left   */
    );

    background: linear-gradient(
      to bottom,
      rgba(255,200,60,0.28) 0%,
      rgba(255,170,30,0.18) 50%,
      rgba(255,140,10,0.05) 100%
    );
    filter:blur(3px);
    animation: breathe 4.5s ease-in-out infinite;
    z-index:5;
  }

  /* wall tint — left wall gets a little warm */
  .wall-tint {
    position:absolute;
    top:0; left:0;
    width:180px; height:64%;
    background: radial-gradient(
      ellipse at 10% 15%,
      rgba(255,180,40,0.18) 0%,
      transparent 55%
    );
    animation: breathe 4.5s ease-in-out infinite;
    z-index:4;
  }

  @keyframes breathe {
    0%,100% { opacity:1.0; }
    50%      { opacity:0.68; }
  }

  /* ─── DUST MOTES ─── */
  .dust {
    position:absolute;
    border-radius:50%;
    background:rgba(255,240,150,0.9);
    box-shadow:0 0 3px rgba(255,220,80,0.7);
    animation: drift linear infinite;
    z-index:7;
  }
  @keyframes drift {
    0%   { transform:translate(0,0);            opacity:0;   }
    8%   {                                       opacity:0.9; }
    88%  {                                       opacity:0.6; }
    100% { transform:translate(var(--dx),var(--dy)); opacity:0;   }
  }
</style>
</head>
<body>
  <h2>Morning Sun — Small Window, Shaft Down-Left, Floor Streak</h2>
  <p class="note">Watch the beam breathe and dust drift through the shaft</p>

  <div class="scene">
    <!-- ROOM -->
    <div class="wall"></div>
    <div class="floor"></div>
    <div class="floor-shadow"></div>

    <!-- FURNITURE -->
    <div class="desk">
      <div class="monitor">
        <div class="monitor-screen"></div>
        <div class="monitor-stand"></div>
      </div>
    </div>

    <div class="picture">🦊</div>

    <!-- shelves -->
    <div class="shelf" style="left:36%">
      <div class="shelf-bar" style="top:33%"></div>
      <div class="shelf-bar" style="top:66%"></div>
      <div style="position:absolute;top:3px;left:2px;display:flex;gap:1px;align-items:flex-end">
        <div class="book" style="height:20px;background:#b03030"></div>
        <div class="book" style="height:16px;background:#3050b0"></div>
        <div class="book" style="height:22px;background:#308040"></div>
        <div class="book" style="height:14px;background:#b08010"></div>
        <div class="book" style="height:18px;background:#802080"></div>
      </div>
    </div>
    <div class="shelf" style="left:46%">
      <div class="shelf-bar" style="top:33%"></div>
      <div class="shelf-bar" style="top:66%"></div>
      <div style="position:absolute;top:3px;left:2px;display:flex;gap:1px;align-items:flex-end">
        <div class="book" style="height:18px;background:#c04040"></div>
        <div class="book" style="height:22px;background:#4060c0"></div>
        <div class="book" style="height:14px;background:#20a050"></div>
        <div class="book" style="height:20px;background:#c09020"></div>
      </div>
    </div>

    <div class="rug"></div>
    <div class="couch"><div class="couch-cushion"></div></div>
    <div class="door"><div class="door-knob"></div></div>
    <div class="cat">🐱</div>
    <div class="char">🦊🎸</div>

    <!-- LIGHT -->
    <div class="wall-tint"></div>
    <div class="beam-outer"></div>
    <div class="beam-inner"></div>
    <div class="floor-streak"></div>

    <!-- window frame (on top so it's visible) -->
    <div class="window-frame">
      <div class="window-crossbar-h"></div>
      <div class="window-crossbar-v"></div>
    </div>

    <!-- DUST MOTES (inside the shaft area) -->
    <div class="dust" style="width:2px;height:2px;left:62px;top:30px;--dx:-8px;--dy:55px;animation-duration:5.5s;animation-delay:0s;"></div>
    <div class="dust" style="width:2px;height:2px;left:72px;top:50px;--dx:-6px;--dy:48px;animation-duration:7s;animation-delay:1s;"></div>
    <div class="dust" style="width:3px;height:3px;left:55px;top:55px;--dx:-10px;--dy:44px;animation-duration:6s;animation-delay:2.2s;"></div>
    <div class="dust" style="width:2px;height:2px;left:80px;top:40px;--dx:-7px;--dy:52px;animation-duration:8s;animation-delay:0.7s;"></div>
    <div class="dust" style="width:2px;height:2px;left:65px;top:70px;--dx:-5px;--dy:38px;animation-duration:6.5s;animation-delay:3.1s;"></div>
    <div class="dust" style="width:2px;height:2px;left:50px;top:45px;--dx:-9px;--dy:50px;animation-duration:7.5s;animation-delay:1.5s;"></div>
    <div class="dust" style="width:3px;height:3px;left:75px;top:60px;--dx:-6px;--dy:42px;animation-duration:5s;animation-delay:4s;"></div>
    <div class="dust" style="width:2px;height:2px;left:58px;top:80px;--dx:-8px;--dy:35px;animation-duration:9s;animation-delay:2.8s;"></div>
  </div>

  <p style="color:#444;font-size:11px;margin-top:12px;">
    In-game: additive blended URP shader on a Quad · no texture needed · all parameters exposed in Inspector
  </p>
</body>
</html>
