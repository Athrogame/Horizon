<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Morning Sun v4</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0a0a;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    min-height:100vh;font-family:sans-serif;
  }
  h2   { color:#999;margin-bottom:6px;font-size:13px;letter-spacing:1px; }
  .note{ color:#444;font-size:11px;margin-bottom:14px; }

  .scene {
    position:relative;width:700px;height:210px;
    overflow:hidden;border:2px solid #2a2a2a;
    image-rendering:pixelated;image-rendering:crisp-edges;
  }

  /* ─── ROOM ─── */
  .wall  { position:absolute;inset:0;background:#3b1d5f; }
  .floor { position:absolute;bottom:0;left:0;right:0;height:35%;background:#5a3b12;border-top:2px solid #7a5518; }

  /* ─── FURNITURE ─── */
  .desk  { position:absolute;bottom:35%;left:1%;width:70px;height:40px;background:#3e2508;border-top:2px solid #6a4510; }
  .monitor { position:absolute;top:-28px;left:12px;width:22px;height:20px;background:#111;border:2px solid #444; }
  .monitor-screen { width:100%;height:72%;background:#0a2040; }
  .monitor-base { position:absolute;bottom:-4px;left:6px;width:10px;height:4px;background:#333; }
  .picture { position:absolute;top:7%;left:3%;width:30px;height:28px;background:#e8e0cc;border:2px solid #5a3a10;display:flex;align-items:center;justify-content:center;font-size:12px; }
  .shelf { position:absolute;bottom:35%;width:48px;height:74px;background:#2e1a06;border:2px solid #4a2e0a; }
  .shelf-plank { position:absolute;left:0;right:0;height:2px;background:#4a2e0a; }
  .books { position:absolute;left:2px;display:flex;gap:1px;align-items:flex-end; }
  .b { display:inline-block;border-radius:1px 0 0 0; }
  .rug { position:absolute;bottom:8%;left:23%;right:32%;height:36px;border-radius:50%;background:#0c0730;border:2px solid #b88010; }
  .couch { position:absolute;bottom:35%;left:52%;width:68px;height:28px;background:#4a1010;border-top:3px solid #6a1818;border-radius:2px 2px 0 0; }
  .door { position:absolute;bottom:35%;right:1%;width:36px;height:68px;background:#1e0c04;border:2px solid #3a1c08;border-radius:2px 2px 0 0; }
  .door-knob { position:absolute;right:5px;top:44%;width:5px;height:5px;border-radius:50%;background:#aa8010; }

  /* ─── WINDOW SOURCE (left wall) ─── */
  .window-src {
    position:absolute;
    left:0; top:18px;
    width:14px; height:38px;
    background:rgba(255,230,120,0.7);
    box-shadow:
      0 0 8px 4px rgba(255,210,80,0.8),
      0 0 20px 10px rgba(255,180,40,0.4),
      0 0 40px 20px rgba(255,160,20,0.15);
    z-index:10;
    animation:breathe 4s ease-in-out infinite;
  }
  /* window crossbar */
  .window-src::before {
    content:'';position:absolute;
    left:0;right:0;top:47%;height:2px;
    background:rgba(40,20,5,0.6);
  }
  .window-src::after {
    content:'';position:absolute;
    top:0;bottom:0;left:47%;width:2px;
    background:rgba(40,20,5,0.6);
  }

  /* ─── RAYS ───
     All originate from left edge around the window.
     transform-origin 0 50% anchors the rotate to the left edge.
     Each ray is a gradient fading from warm amber → transparent.
     Slightly different angles + widths = natural window ray look.
  */
  .ray {
    position:absolute;
    left:0;
    transform-origin:0 50%;
    background:linear-gradient(
      to right,
      rgba(255,220,80,var(--bright)) 0%,
      rgba(255,200,60,calc(var(--bright) * 0.7)) 20%,
      rgba(255,180,40,calc(var(--bright) * 0.35)) 55%,
      transparent 100%
    );
    filter:blur(var(--blur));
    animation:breathe 4s ease-in-out infinite;
    z-index:5;
    mix-blend-mode:screen;
    animation-delay:var(--delay);
  }

  @keyframes breathe {
    0%,100% { opacity:1; }
    50%      { opacity:0.6; }
  }

  /* ─── DUST MOTES ─── */
  .dust {
    position:absolute;
    width:2px;height:2px;
    background:rgba(255,245,160,1);
    box-shadow:0 0 2px 1px rgba(255,220,80,0.8);
    animation:mote linear infinite;
    z-index:9;
    animation-delay:var(--delay);
  }
  @keyframes mote {
    0%   { transform:translate(0,0);             opacity:0; }
    8%   {                                        opacity:1; }
    90%  {                                        opacity:0.8; }
    100% { transform:translate(var(--dx),var(--dy)); opacity:0; }
  }
</style>
</head>
<body>
  <h2>Morning Sun — Multiple Soft Rays from Left Window · Pixel Art</h2>
  <p class="note">Rays breathe at slightly different rates · dust drifts through the light</p>

  <div class="scene">
    <!-- ROOM -->
    <div class="wall"></div>
    <div class="floor"></div>

    <!-- FURNITURE -->
    <div class="desk">
      <div class="monitor"><div class="monitor-screen"></div><div class="monitor-base"></div></div>
    </div>
    <div class="picture">🦊</div>
    <div class="shelf" style="left:35%">
      <div class="shelf-plank" style="top:33%"></div><div class="shelf-plank" style="top:66%"></div>
      <div class="books" style="top:2px">
        <div class="b" style="height:22px;width:6px;background:#b02020"></div>
        <div class="b" style="height:17px;width:5px;background:#2040b0"></div>
        <div class="b" style="height:24px;width:6px;background:#20a040"></div>
        <div class="b" style="height:14px;width:5px;background:#b07010"></div>
        <div class="b" style="height:19px;width:6px;background:#802090"></div>
      </div>
      <div class="books" style="top:36%">
        <div class="b" style="height:17px;width:6px;background:#c05030"></div>
        <div class="b" style="height:20px;width:5px;background:#207888"></div>
        <div class="b" style="height:15px;width:6px;background:#a02050"></div>
        <div class="b" style="height:21px;width:5px;background:#4060a0"></div>
      </div>
    </div>
    <div class="shelf" style="left:44%">
      <div class="shelf-plank" style="top:33%"></div><div class="shelf-plank" style="top:66%"></div>
      <div class="books" style="top:2px">
        <div class="b" style="height:19px;width:6px;background:#d03030"></div>
        <div class="b" style="height:23px;width:5px;background:#4040c0"></div>
        <div class="b" style="height:15px;width:6px;background:#20a050"></div>
        <div class="b" style="height:20px;width:5px;background:#c08010"></div>
      </div>
    </div>
    <div class="rug"></div>
    <div class="couch"></div>
    <div class="door"><div class="door-knob"></div></div>
    <div style="position:absolute;bottom:36%;left:46%;font-size:11px;">🐇</div>
    <div style="position:absolute;bottom:36%;right:12%;font-size:12px;">🦊🎸</div>
    <div style="position:absolute;bottom:2%;left:4%;font-size:10px;">💤</div>

    <!-- ─── LIGHT RAYS from left window ─── -->
    <!-- Each ray: top = where it exits the window, height = ray thickness,
         width = how far it reaches, rotate = angle into room            -->

    <!-- Ray 1: wide, main upper beam -->
    <div class="ray" style="
      top:20px; height:28px; width:75%;
      transform:rotate(26deg);
      --bright:0.22; --blur:7px; --delay:0s;
    "></div>

    <!-- Ray 2: bright tight core -->
    <div class="ray" style="
      top:28px; height:12px; width:68%;
      transform:rotate(28deg);
      --bright:0.38; --blur:2px; --delay:0.4s;
    "></div>

    <!-- Ray 3: secondary ray, slightly steeper -->
    <div class="ray" style="
      top:38px; height:18px; width:60%;
      transform:rotate(32deg);
      --bright:0.25; --blur:4px; --delay:0.8s;
    "></div>

    <!-- Ray 4: thin bright ray between 2 and 3 -->
    <div class="ray" style="
      top:34px; height:6px; width:55%;
      transform:rotate(30deg);
      --bright:0.32; --blur:1.5px; --delay:1.2s;
    "></div>

    <!-- Ray 5: lower soft wide ray -->
    <div class="ray" style="
      top:44px; height:24px; width:50%;
      transform:rotate(35deg);
      --bright:0.18; --blur:8px; --delay:0.6s;
    "></div>

    <!-- Ray 6: thin accent, steepest -->
    <div class="ray" style="
      top:50px; height:8px; width:42%;
      transform:rotate(38deg);
      --bright:0.20; --blur:2px; --delay:1.6s;
    "></div>

    <!-- Ambient glow around the source -->
    <div style="
      position:absolute;left:0;top:0;
      width:180px;height:120px;
      background:radial-gradient(ellipse at 0% 25%, rgba(255,180,40,0.20) 0%, transparent 60%);
      z-index:4;pointer-events:none;
      animation:breathe 4s ease-in-out infinite;
    "></div>

    <!-- WINDOW SOURCE (drawn last so it's on top) -->
    <div class="window-src"></div>

    <!-- DUST MOTES — drifting diagonally with the ray direction -->
    <div class="dust" style="left:30px;top:28px;--dx:90px;--dy:44px;animation-duration:6s;--delay:0s;"></div>
    <div class="dust" style="left:55px;top:38px;--dx:70px;--dy:36px;animation-duration:7.5s;--delay:1.2s;"></div>
    <div class="dust" style="left:20px;top:34px;--dx:110px;--dy:50px;animation-duration:5.5s;--delay:2.4s;"></div>
    <div class="dust" style="left:80px;top:42px;--dx:60px;--dy:32px;animation-duration:8s;--delay:0.6s;"></div>
    <div class="dust" style="left:45px;top:50px;--dx:80px;--dy:38px;animation-duration:6.5s;--delay:3.1s;"></div>
    <div class="dust" style="left:100px;top:35px;--dx:50px;--dy:28px;animation-duration:9s;--delay:1.8s;"></div>
    <div class="dust" style="left:15px;top:46px;--dx:95px;--dy:42px;animation-duration:7s;--delay:4.2s;"></div>
    <div class="dust" style="left:65px;top:30px;--dx:75px;--dy:40px;animation-duration:6s;--delay:2s;"></div>
    <div class="dust" style="left:120px;top:48px;--dx:40px;--dy:22px;animation-duration:8.5s;--delay:0.3s;"></div>
  </div>

  <p style="color:#333;font-size:11px;margin-top:10px;">In Unity: additive URP shader on a Quad · no texture · all params tweakable in Inspector</p>
</body>
</html>
