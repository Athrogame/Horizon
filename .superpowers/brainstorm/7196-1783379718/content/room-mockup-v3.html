<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Morning Sun v3</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0a0a;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    min-height:100vh; font-family:sans-serif;
  }
  h2  { color:#999; margin-bottom:6px; font-size:13px; letter-spacing:1px; }
  .note { color:#444; font-size:11px; margin-bottom:14px; }

  /* pixel-art rendering on everything */
  .scene {
    position:relative;
    width:700px; height:210px;
    overflow:hidden;
    border:2px solid #2a2a2a;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
  }

  /* ── ROOM ── */
  .wall  { position:absolute;inset:0; background:#3b1d5f; }
  .floor {
    position:absolute; bottom:0;left:0;right:0; height:35%;
    background:#5a3b12;
    border-top:2px solid #7a5518;
  }

  /* ── FURNITURE (pixel-art blocks) ── */
  /* desk */
  .desk {
    position:absolute; bottom:35%; left:1%;
    width:70px; height:40px;
    background:#3e2508; border-top:2px solid #6a4510;
  }
  .monitor {
    position:absolute; top:-28px; left:12px;
    width:22px; height:20px;
    background:#111; border:2px solid #444;
  }
  .monitor-screen { width:100%; height:72%; background:#0a2040; }
  .monitor-base {
    position:absolute; bottom:-4px; left:6px;
    width:10px; height:4px; background:#333;
  }
  .plant {
    position:absolute; top:-18px; right:4px;
    width:10px; height:14px;
    background:#1a5a18; border-radius:40% 60% 0 0;
  }

  /* picture */
  .picture {
    position:absolute; top:7%; left:3%;
    width:30px; height:28px;
    background:#e8e0cc; border:2px solid #5a3a10;
    display:flex;align-items:center;justify-content:center;font-size:12px;
  }

  /* shelves */
  .shelf {
    position:absolute; bottom:35%;
    width:48px; height:74px;
    background:#2e1a06; border:2px solid #4a2e0a;
  }
  .shelf-plank {
    position:absolute;left:0;right:0;height:2px;background:#4a2e0a;
  }
  .books { position:absolute;left:2px;display:flex;gap:1px;align-items:flex-end; }
  .b { display:inline-block;border-radius:1px 0 0 0; }

  /* rug */
  .rug {
    position:absolute; bottom:8%; left:23%; right:32%;
    height:36px; border-radius:50%;
    background:#0c0730; border:2px solid #b88010;
  }

  /* couch */
  .couch {
    position:absolute; bottom:35%; left:52%;
    width:68px; height:28px;
    background:#4a1010; border-top:3px solid #6a1818;
    border-radius:2px 2px 0 0;
  }

  /* door */
  .door {
    position:absolute; bottom:35%; right:1%;
    width:36px; height:68px;
    background:#1e0c04; border:2px solid #3a1c08;
    border-radius:2px 2px 0 0;
  }
  .door-knob {
    position:absolute;right:5px;top:44%;
    width:5px;height:5px;border-radius:50%;background:#aa8010;
  }

  /* ── LIGHT SHAFT ──
     Comes from the LEFT (off-screen or left edge, upper area)
     Diagonal band going down-right across the scene
     Pixel-art friendly: no blur on the beam itself, just soft alpha
  */

  /* Outer glow — wide soft band */
  .shaft-glow {
    position:absolute;
    /* angled band: upper-left → lower-right */
    top:0; left:0; right:0; bottom:0;

    /* gradient running perpendicular to the beam direction */
    background: repeating-linear-gradient(
      -55deg,
      transparent                        0px,
      transparent                        30px,
      rgba(255,200,60,0.04)              30px,
      rgba(255,210,70,0.13)              55px,
      rgba(255,220,80,0.20)              70px,
      rgba(255,215,75,0.13)              85px,
      rgba(255,200,60,0.04)              110px,
      transparent                        110px,
      transparent                        999px
    );
    /* slight blur just on glow */
    filter: blur(6px);
    animation: breathe 4s ease-in-out infinite;
    z-index: 5;
    mix-blend-mode: screen;
  }

  /* Inner bright beam — sharper, pixelated edge */
  .shaft-beam {
    position:absolute;
    top:0; left:0; right:0; bottom:0;

    background: repeating-linear-gradient(
      -55deg,
      transparent                        0px,
      transparent                        48px,
      rgba(255,235,120,0.0)              48px,
      rgba(255,235,120,0.18)             60px,
      rgba(255,245,140,0.28)             68px,
      rgba(255,235,120,0.18)             76px,
      rgba(255,235,120,0.0)              88px,
      transparent                        88px,
      transparent                        999px
    );
    filter: blur(1px);
    animation: breathe 4s ease-in-out infinite;
    z-index: 6;
    mix-blend-mode: screen;
  }

  /* Hard pixel-art edge line — gives it that crisp pixel quality */
  .shaft-edge {
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    background: repeating-linear-gradient(
      -55deg,
      transparent            0px,
      transparent            67px,
      rgba(255,255,200,0.12) 67px,
      rgba(255,255,200,0.12) 69px,
      transparent            69px,
      transparent            999px
    );
    z-index:7;
    animation: breathe 4s ease-in-out infinite;
  }

  @keyframes breathe {
    0%,100% { opacity:1.0; }
    50%      { opacity:0.65; }
  }

  /* ── DUST MOTES ── */
  .dust {
    position:absolute;
    border-radius:50%;
    background:rgba(255,245,160,0.95);
    /* pixel snap — no sub-pixel rendering */
    box-shadow:0 0 0 1px rgba(255,220,80,0.5);
    animation: mote linear infinite;
    z-index:8;
  }
  @keyframes mote {
    0%   { transform:translate(0px,0px); opacity:0; }
    10%  { opacity:1; }
    90%  { opacity:0.7; }
    100% { transform:translate(var(--dx),var(--dy)); opacity:0; }
  }
</style>
</head>
<body>
  <h2>Morning Sun — Diagonal Shaft from Left · Pixel Art Style</h2>
  <p class="note">Beam breathes slowly · dust motes drift · no floor effect</p>

  <div class="scene">
    <!-- ROOM -->
    <div class="wall"></div>
    <div class="floor"></div>

    <!-- FURNITURE -->
    <div class="desk">
      <div class="monitor">
        <div class="monitor-screen"></div>
        <div class="monitor-base"></div>
      </div>
      <div class="plant"></div>
    </div>
    <div class="picture">🦊</div>

    <div class="shelf" style="left:35%">
      <div class="shelf-plank" style="top:33%"></div>
      <div class="shelf-plank" style="top:66%"></div>
      <div class="books" style="top:2px">
        <div class="b" style="height:22px;width:6px;background:#b02020"></div>
        <div class="b" style="height:17px;width:5px;background:#2040b0"></div>
        <div class="b" style="height:24px;width:6px;background:#20a040"></div>
        <div class="b" style="height:14px;width:5px;background:#b07010"></div>
        <div class="b" style="height:19px;width:6px;background:#802090"></div>
      </div>
      <div class="books" style="top:36%">
        <div class="b" style="height:17px;width:6px;background:#c05030"></div>
        <div class="b" style="height:20px;width:5px;background:#207888"></div>
        <div class="b" style="height:15px;width:6px;background:#a02050"></div>
        <div class="b" style="height:21px;width:5px;background:#4060a0"></div>
      </div>
    </div>

    <div class="shelf" style="left:44%">
      <div class="shelf-plank" style="top:33%"></div>
      <div class="shelf-plank" style="top:66%"></div>
      <div class="books" style="top:2px">
        <div class="b" style="height:19px;width:6px;background:#d03030"></div>
        <div class="b" style="height:23px;width:5px;background:#4040c0"></div>
        <div class="b" style="height:15px;width:6px;background:#20a050"></div>
        <div class="b" style="height:20px;width:5px;background:#c08010"></div>
      </div>
    </div>

    <div class="rug"></div>
    <div class="couch"></div>
    <div class="door"><div class="door-knob"></div></div>

    <!-- emojis for characters -->
    <div style="position:absolute;bottom:36%;left:46%;font-size:11px;">🐇</div>
    <div style="position:absolute;bottom:36%;right:12%;font-size:12px;">🦊🎸</div>
    <div style="position:absolute;bottom:2%;left:4%;font-size:10px;">💤</div>

    <!-- LIGHT SHAFT (on top of room, below UI) -->
    <div class="shaft-glow"></div>
    <div class="shaft-beam"></div>
    <div class="shaft-edge"></div>

    <!-- DUST — positioned within the beam (upper-left quadrant) -->
    <div class="dust" style="width:2px;height:2px;left:40px;top:20px;--dx:18px;--dy:55px;animation-duration:6s;animation-delay:0s;"></div>
    <div class="dust" style="width:2px;height:2px;left:80px;top:35px;--dx:14px;--dy:48px;animation-duration:7.5s;animation-delay:1.3s;"></div>
    <div class="dust" style="width:2px;height:2px;left:25px;top:50px;--dx:20px;--dy:42px;animation-duration:5.5s;animation-delay:2s;"></div>
    <div class="dust" style="width:2px;height:2px;left:110px;top:28px;--dx:10px;--dy:52px;animation-duration:8s;animation-delay:0.5s;"></div>
    <div class="dust" style="width:2px;height:2px;left:60px;top:65px;--dx:16px;--dy:38px;animation-duration:6.5s;animation-delay:3.2s;"></div>
    <div class="dust" style="width:2px;height:2px;left:140px;top:45px;--dx:8px;--dy:44px;animation-duration:7s;animation-delay:4s;"></div>
    <div class="dust" style="width:2px;height:2px;left:95px;top:80px;--dx:12px;--dy:30px;animation-duration:9s;animation-delay:1.8s;"></div>
    <div class="dust" style="width:2px;height:2px;left:170px;top:55px;--dx:6px;--dy:40px;animation-duration:6s;animation-delay:2.7s;"></div>
  </div>

  <p style="color:#333;font-size:11px;margin-top:10px;">Shader renders this in HLSL · additive blend · placed on a Quad in your scene</p>
</body>
</html>
